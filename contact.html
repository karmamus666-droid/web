<script>
document.getElementById('google-contact-form').addEventListener('submit', function(e) {
e.preventDefault(); // 阻止網頁跳轉
var form = this;
var loading = form.querySelector('.loading');
var errorMessage = form.querySelector('.error-message');
var sentMessage = form.querySelector('.sent-message');
// 顯示 Loading，隱藏其他提示
loading.style.display = 'block';
errorMessage.style.display = 'none';
sentMessage.style.display = 'none';
// 封裝表單資料
var formData = new FormData(form);
var searchParams = new URLSearchParams();
for (var pair of formData) {
searchParams.append(pair[0], pair[1]);
}
// 用 fetch 發送 POST 請求到 Google GAS
fetch(form.action, {
method: 'POST',
body: searchParams,
headers: {
'Content-Type': 'application/x-www-form-urlencoded'
}
})
.then(response => response.text())
.then(data => {
loading.style.display = 'none';
if (data === 'success') {
sentMessage.style.display = 'block'; // 顯示成功畫面
form.reset(); // 清空表單
} else {
errorMessage.textContent = '傳送失敗，請稍後再試。錯誤原因：' + data;
errorMessage.style.display = 'block';
}
})
.catch(error => {
loading.style.display = 'none';
errorMessage.textContent = '連線錯誤：' + error;
errorMessage.style.display = 'block';
});
});
</script>
